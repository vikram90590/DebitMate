<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebitMate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>DebitMate 💖</h1>

  <div id="next-payment" class="countdown">
    Next Payment in: -- days
  </div>

  <h2>Upcoming Debits</h2>
  <div id="debit-list"></div>

  <h2>Add New Debit</h2>
  <form id="add-debit-form">
    <label>Name:</label>
    <input type="text" id="name" required><br>
    <label>Amount ($):</label>
    <input type="number" id="amount" required><br>
    <label>Category:</label>
    <input type="text" id="category" required><br>
    <label>Next Date:</label>
    <input type="date" id="nextDate" required><br>
    <label>Reminder Days Before:</label>
    <select id="reminderDays">
      <option value="1">1</option>
      <option value="3">3</option>
      <option value="7">7</option>
    </select><br><br>
    <button type="submit">Add Debit</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
